        fromDatabase:
          name: greentech-db-v2
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: greentech-db-v2
          property: port
      - key: DATABASE_USER
        fromDatabase:
          name: greentech-db-v2
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: greentech-db-v2
          property: password
      - key: DATABASE_NAME
        fromDatabase:
          name: greentech-db-v2
