  - type: web
    name: greentech-client-portal-service-v2
    env: docker
    plan: free
    region: ohio
    rootDir: ./client-portal-service
    envVars:
      - fromGroup: greentech-mail-credentials
      - key: DATABASE_HOST
        fromDatabase:
          name: greentech-db-v2
