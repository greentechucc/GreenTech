global:
  scrape_interval: 2s
  evaluation_interval: 2s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets: ['greentech-api-gateway-v2.onrender.com']
        labels:
          service: api-gateway

  - job_name: 'crm-service'
    metrics_path: /metrics
    scheme: https
    static_configs:
