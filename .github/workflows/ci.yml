# =============================================================================
# GreenTech — Pipeline de Integración Continua (CI)
# Se ejecuta en cada Pull Request hacia main.
# Detecta qué servicios cambiaron y ejecuta solo los jobs necesarios.
# =============================================================================

name: "CI — Integración Continua"

on:
  pull_request:
    branches: [main]

# Cancelar ejecuciones anteriores del mismo PR
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ===========================================================================
  # Job 1: Detectar qué servicios fueron modificados
  # ===========================================================================
  detect-changes:
    name: "🔍 Detectar Cambios"
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      crm-service: ${{ steps.filter.outputs.crm-service }}
      project-service: ${{ steps.filter.outputs.project-service }}
      quotation-service: ${{ steps.filter.outputs.quotation-service }}
      billing-service: ${{ steps.filter.outputs.billing-service }}
      permit-service: ${{ steps.filter.outputs.permit-service }}
      client-portal-service: ${{ steps.filter.outputs.client-portal-service }}
      analytics-service: ${{ steps.filter.outputs.analytics-service }}
      monitoring-service: ${{ steps.filter.outputs.monitoring-service }}
      admin-web: ${{ steps.filter.outputs.admin-web }}
      customer-web: ${{ steps.filter.outputs.customer-web }}
      nestjs-services: ${{ steps.build-matrix.outputs.nestjs }}
      nextjs-apps: ${{ steps.build-matrix.outputs.nextjs }}
      critical-services: ${{ steps.build-matrix.outputs.critical }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Filtrar cambios por ruta
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'api-gateway/**'
            crm-service:
              - 'crm-service/**'
            project-service:
              - 'project-service/**'
            quotation-service:
              - 'quotation-service/**'
            billing-service:
              - 'billing-service/**'
            permit-service:
              - 'permit-service/**'
            client-portal-service:
              - 'client-portal-service/**'
            analytics-service:
              - 'analytics-service/**'
            monitoring-service:
              - 'monitoring-service/**'
            admin-web:
              - 'admin-web/**'
            customer-web:
              - 'customer-web/**'

      - name: Construir matrices de servicios
        id: build-matrix
        run: |
          # Servicios NestJS modificados
          NESTJS_SERVICES=()
          for svc in api-gateway crm-service project-service quotation-service billing-service permit-service client-portal-service analytics-service monitoring-service; do
            key=$(echo "$svc" | tr '-' '_')
            val="${{ steps.filter.outputs.api-gateway }}"
            case "$svc" in
              api-gateway) val="${{ steps.filter.outputs.api-gateway }}" ;;
              crm-service) val="${{ steps.filter.outputs.crm-service }}" ;;
              project-service) val="${{ steps.filter.outputs.project-service }}" ;;
              quotation-service) val="${{ steps.filter.outputs.quotation-service }}" ;;
              billing-service) val="${{ steps.filter.outputs.billing-service }}" ;;
              permit-service) val="${{ steps.filter.outputs.permit-service }}" ;;
              client-portal-service) val="${{ steps.filter.outputs.client-portal-service }}" ;;
              analytics-service) val="${{ steps.filter.outputs.analytics-service }}" ;;
              monitoring-service) val="${{ steps.filter.outputs.monitoring-service }}" ;;
            esac
            if [ "$val" == "true" ]; then
              NESTJS_SERVICES+=("\"$svc\"")
            fi
          done

          if [ ${#NESTJS_SERVICES[@]} -gt 0 ]; then
            NESTJS_JSON="[$(IFS=,; echo "${NESTJS_SERVICES[*]}")]"
          else
            NESTJS_JSON="[]"
          fi
          echo "nestjs=$NESTJS_JSON" >> $GITHUB_OUTPUT
          echo "📦 Servicios NestJS modificados: $NESTJS_JSON"

          # Frontends Next.js modificados
          NEXTJS_APPS=()
          if [ "${{ steps.filter.outputs.admin-web }}" == "true" ]; then
            NEXTJS_APPS+=("\"admin-web\"")
          fi
          if [ "${{ steps.filter.outputs.customer-web }}" == "true" ]; then
            NEXTJS_APPS+=("\"customer-web\"")
          fi

          if [ ${#NEXTJS_APPS[@]} -gt 0 ]; then
            NEXTJS_JSON="[$(IFS=,; echo "${NEXTJS_APPS[*]}")]"
          else
            NEXTJS_JSON="[]"
          fi
          echo "nextjs=$NEXTJS_JSON" >> $GITHUB_OUTPUT
          echo "🌐 Frontends Next.js modificados: $NEXTJS_JSON"

          # Servicios críticos (requieren pruebas de integración)
          CRITICAL=()
          if [ "${{ steps.filter.outputs.quotation-service }}" == "true" ]; then
            CRITICAL+=("\"quotation-service\"")
          fi
          if [ "${{ steps.filter.outputs.project-service }}" == "true" ]; then
            CRITICAL+=("\"project-service\"")
          fi

          if [ ${#CRITICAL[@]} -gt 0 ]; then
            CRITICAL_JSON="[$(IFS=,; echo "${CRITICAL[*]}")]"
          else
            CRITICAL_JSON="[]"
          fi
          echo "critical=$CRITICAL_JSON" >> $GITHUB_OUTPUT
          echo "🔗 Servicios críticos modificados: $CRITICAL_JSON"

  # ===========================================================================
  # Job 2: CI para microservicios NestJS
  # Linting → Pruebas unitarias con cobertura → Build Docker multi-stage
  # ===========================================================================
  ci-nestjs:
    name: "🧪 CI — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.nestjs-services != '[]'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.nestjs-services) }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./${{ matrix.service }}/package-lock.json"

      - name: Instalar dependencias
        working-directory: ./${{ matrix.service }}
        run: npm ci

      - name: "🔍 Linting (ESLint)"
        working-directory: ./${{ matrix.service }}
        run: npm run lint

      - name: "🧪 Pruebas unitarias con cobertura (Jest)"
        working-directory: ./${{ matrix.service }}
        run: npm run test:cov -- --forceExit

      - name: "📊 Resumen de cobertura"
        if: always()
        working-directory: ./${{ matrix.service }}
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### 📊 Cobertura de ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-summary.json | head -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: "🐳 Construir imagen Docker (multi-stage)"
        working-directory: ./${{ matrix.service }}
        run: |
          echo "📦 Construyendo imagen Docker multi-stage para ${{ matrix.service }}..."
          docker build -t greentech/${{ matrix.service }}:ci-${{ github.sha }} .
          echo "✅ Imagen construida exitosamente: greentech/${{ matrix.service }}:ci-${{ github.sha }}"

  # ===========================================================================
  # Job 3: CI para frontends Next.js (admin-web, customer-web)
  # Linting → Build — No Docker (desplegados en Vercel)
  # ===========================================================================
  ci-nextjs:
    name: "🌐 CI — ${{ matrix.app }}"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.nextjs-apps != '[]'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.nextjs-apps) }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./${{ matrix.app }}/package-lock.json"

      - name: Instalar dependencias
        working-directory: ./${{ matrix.app }}
        run: npm ci

      - name: "🔍 Linting (ESLint)"
        working-directory: ./${{ matrix.app }}
        run: npm run lint

      - name: "🏗️ Build de producción (Next.js)"
        working-directory: ./${{ matrix.app }}
        run: npm run build

  # ===========================================================================
  # Job 4: Pruebas de integración para servicios críticos
  # ===========================================================================
  integration-tests:
    name: "🔗 Integración — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.critical-services != '[]'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.critical-services) }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: test_db
      NODE_ENV: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./${{ matrix.service }}/package-lock.json"

      - name: Instalar dependencias
        working-directory: ./${{ matrix.service }}
        run: npm ci

      - name: Compilar servicio
        working-directory: ./${{ matrix.service }}
        run: npm run build

      - name: "🔗 Ejecutar pruebas de integración (e2e)"
        working-directory: ./${{ matrix.service }}
        run: npm run test:e2e -- --forceExit
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: test_db

  # ===========================================================================
  # Job 5: Gate de calidad — resumen final
  # ===========================================================================
  ci-gate:
    name: "✅ CI Gate"
    runs-on: ubuntu-latest
    needs: [detect-changes, ci-nestjs, ci-nextjs, integration-tests]
    if: always()
    steps:
      - name: Validar resultados
        run: |
          echo "### 🏁 Resumen del Pipeline CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.ci-nestjs.result }}" == "failure" ]; then
            echo "❌ CI NestJS falló" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          if [ "${{ needs.ci-nextjs.result }}" == "failure" ]; then
            echo "❌ CI Next.js falló" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" == "failure" ]; then
            echo "❌ Pruebas de integración fallaron" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ Todos los checks pasaron exitosamente" >> $GITHUB_STEP_SUMMARY
